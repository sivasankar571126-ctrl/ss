<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SALIM SOS — Emergency Response</title>

  <!-- PWA -->
  <link rel="manifest"          href="/manifest.json" />
  <meta name="theme-color"      content="#050a0e" />
  <meta name="application-name" content="SALIM SOS" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable"          content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title"            content="SALIM SOS" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Description -->
  <meta name="description" content="One-tap emergency SOS system for Salim and his guardian network." />

  <!-- Leaflet CSS (free, no API key) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- App CSS -->
  <link rel="stylesheet" href="/src/styles.css" />

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
  <!-- ─── App mount point ─────────────────────────────────── -->
  <div id="app">
    <!-- Rendered by App.js -->
    <div style="
      display:flex; align-items:center; justify-content:center;
      height:100vh; flex-direction:column; gap:16px;
      font-family:'Share Tech Mono',monospace; color:#FF1C1C;
    ">
      <div style="font-size:3rem; animation:spin 1s linear infinite">⏳</div>
      <div style="letter-spacing:0.2em; font-size:0.9rem">LOADING SALIM SOS…</div>
    </div>
  </div>

  <!-- Leaflet JS (free maps, no API key needed) -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLs="
    crossorigin="">
  </script>

  <!-- Firebase (loaded via ES module in firebase-config.js) -->

  <!-- Main app (ES module) -->
  <script type="module" src="/src/App.js"></script>

  <!-- Inline loading spinner keyframe -->
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
