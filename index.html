<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --r:#FF1C1C;--rg:rgba(255,28,28,.35);
  --g:#00FF87;--b:#4FC3F7;--o:#FFB800;
  --bg:#050a0e;--bg2:#0d1117;
  --w:#F4F4F5;--w3:rgba(244,244,245,.35);
  --fn:'Bebas Neue',sans-serif;
  --fm:'Share Tech Mono',monospace;
  --fr:'Rajdhani',sans-serif;
}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--w);font-family:var(--fr);-webkit-font-smoothing:antialiased;overscroll-behavior:none;user-select:none}
@keyframes bgFlash{0%,49%{background:#1a0000}50%,100%{background:#0d0000}}
@keyframes scan{from{top:-3px}to{top:100vh}}
@keyframes ringPulse{0%{opacity:1;transform:scale(.94)}100%{opacity:0;transform:scale(1.45)}}
@keyframes btnGlow{0%,100%{box-shadow:0 0 0 5px var(--r),0 0 40px var(--rg)}50%{box-shadow:0 0 0 10px #FF3333,0 0 70px rgba(255,28,28,.7)}}
@keyframes borderFlash{0%,49%{border-color:var(--r);box-shadow:0 0 50px var(--rg)}50%,100%{border-color:#550000;box-shadow:none}}
@keyframes urgentBlink{0%,100%{opacity:1}50%{opacity:.38}}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes gridPan{from{background-position:0 0}to{background-position:38px 38px}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes sosBlink{0%,60%,100%{opacity:1;text-shadow:0 0 20px currentColor}30%{opacity:.3;text-shadow:none}}
@keyframes spin{to{transform:rotate(360deg)}}

#app{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:0 16px 48px;position:relative;overflow-x:hidden}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,0,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,0,0,.04) 1px,transparent 1px);background-size:38px 38px;animation:gridPan 20s linear infinite;pointer-events:none;z-index:0}
.scanline{position:fixed;left:0;width:100%;height:3px;background:linear-gradient(90deg,transparent,rgba(255,28,28,.85),transparent);animation:scan 2s linear infinite;z-index:100;pointer-events:none}

/* ROLE SELECTOR */
.role-selector{display:flex;flex-direction:column;align-items:center;gap:20px;padding-top:44px;width:100%;max-width:500px;animation:slideUp .55s ease both;position:relative;z-index:2}
.sos-logo{display:flex;gap:2px;margin-bottom:4px}
.sos-logo span{font-family:var(--fn);font-size:clamp(3.5rem,12vw,5.5rem);line-height:1}
.sos-logo .s1{color:var(--r);animation:sosBlink 1.2s 0s infinite}
.sos-logo .o{color:#FF6600;animation:sosBlink 1.2s .4s infinite}
.sos-logo .s2{color:var(--r);animation:sosBlink 1.2s .8s infinite}
.app-title{font-family:var(--fn);font-size:clamp(1.6rem,5vw,2.8rem);letter-spacing:.28em;color:var(--w)}
.app-subtitle{font-family:var(--fm);font-size:.7rem;letter-spacing:.22em;color:var(--r);margin-bottom:8px}
.divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--r),transparent);margin:0 auto 8px}
.role-desc{font-size:.95rem;color:var(--w3);text-align:center;line-height:1.5}
.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
@media(max-width:380px){.role-cards{grid-template-columns:1fr}}
.role-card{padding:22px 16px;border-radius:10px;background:var(--bg2);border:1px solid rgba(255,255,255,.07);cursor:pointer;text-align:left;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column;gap:6px}
.role-card:hover{transform:translateY(-3px)}
.role-card.sender:hover{box-shadow:0 0 35px rgba(255,28,28,.28);border-color:rgba(255,28,28,.6)}
.role-card.guardian:hover{box-shadow:0 0 35px rgba(79,195,247,.2);border-color:rgba(79,195,247,.6)}
.card-icon{font-size:1.9rem}.card-role{font-family:var(--fm);font-size:.58rem;letter-spacing:.2em;color:var(--w3)}
.card-name{font-family:var(--fn);font-size:1.7rem;letter-spacing:.08em;line-height:1}
.sender .card-name{color:var(--r)}.guardian .card-name{color:var(--b)}
.card-desc{font-size:.85rem;color:var(--w3);line-height:1.45}
.card-phone{font-family:var(--fm);font-size:.65rem;color:rgba(255,255,255,.22)}
.card-enter{font-family:var(--fm);font-size:.65rem;letter-spacing:.12em;margin-top:6px}
.sender .card-enter{color:var(--r)}.guardian .card-enter{color:var(--b)}
.sys-status{display:flex;align-items:center;gap:7px;font-family:var(--fm);font-size:.6rem;letter-spacing:.12em;color:rgba(255,255,255,.22)}

/* SENDER */
.sender-view{display:flex;flex-direction:column;align-items:center;gap:18px;padding-top:20px;width:100%;max-width:420px;position:relative;z-index:2;animation:slideUp .5s ease both}
body.emergency-active{animation:bgFlash .65s infinite}
.back-btn{align-self:flex-start;background:transparent;border:1px solid rgba(255,255,255,.14);color:var(--w3);font-family:var(--fm);font-size:.65rem;letter-spacing:.1em;padding:6px 14px;border-radius:5px;cursor:pointer;transition:all .18s}
.back-btn:hover{color:var(--w);border-color:rgba(255,255,255,.4)}
.patient-badge{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 18px;width:100%}
.badge-name{font-family:var(--fn);font-size:1.4rem;letter-spacing:.08em;color:var(--r)}
.badge-phone{font-family:var(--fm);font-size:.7rem;color:var(--w3)}
.gps-bar{font-family:var(--fm);font-size:.75rem;color:var(--w3);display:flex;align-items:center;gap:8px;align-self:flex-start}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:var(--g);box-shadow:0 0 7px var(--g);animation:dotPulse 2s infinite}
.dot-yellow{background:var(--o);animation:dotPulse .8s infinite}
.sos-button-wrap{display:flex;align-items:center;justify-content:center;padding:24px 0 10px}
.sos-btn{position:relative;width:clamp(190px,52vw,250px);height:clamp(190px,52vw,250px);border-radius:50%;border:none;background:radial-gradient(circle,#CC0000 0%,#880000 58%,#440000 100%);cursor:pointer;display:flex;align-items:center;justify-content:center;animation:btnGlow 2s ease-in-out infinite;transition:transform .14s}
.sos-btn:hover{transform:scale(1.04)}.sos-btn:active{transform:scale(.95);animation:none}
.sos-btn:disabled{opacity:.55;cursor:not-allowed;animation:none}
.ring,.ring2{position:absolute;inset:-14px;border-radius:50%;border:2px solid rgba(255,28,28,.45);animation:ringPulse 2.2s ease-out infinite;pointer-events:none}
.ring2{inset:-28px;border-color:rgba(255,28,28,.25);animation-delay:1.1s}
.btn-inner{display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
.btn-icon{font-size:2.4rem}.btn-label{font-family:var(--fn);font-size:1.5rem;letter-spacing:.1em;color:#fff}
.btn-sub{font-family:var(--fm);font-size:.6rem;letter-spacing:.18em;color:rgba(255,255,255,.65)}
.live-panel{width:100%;background:rgba(255,28,28,.1);border:2px solid var(--r);border-radius:10px;padding:18px 22px;text-align:center;animation:borderFlash .65s infinite}
.live-head{font-family:var(--fn);font-size:1.6rem;letter-spacing:.1em;color:var(--r)}
.live-timer{font-family:var(--fm);font-size:2.8rem;color:var(--w);letter-spacing:.08em;margin:4px 0}
.live-stat{font-family:var(--fm);font-size:.74rem;color:var(--w3);margin-top:4px}
.coords-card{width:100%;background:rgba(0,0,0,.45);border:1px solid rgba(255,51,51,.28);border-radius:8px;padding:12px 16px}
.coord-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.coord-lbl{font-family:var(--fm);font-size:.6rem;letter-spacing:.18em;color:rgba(255,255,255,.28)}
.coord-val{font-family:var(--fm);font-size:.88rem;color:#FF6666}
.resolve-btn{background:transparent;border:1px solid rgba(0,255,135,.45);color:var(--g);font-family:var(--fm);font-size:.72rem;letter-spacing:.1em;padding:10px 24px;border-radius:6px;cursor:pointer;transition:all .18s;width:100%}
.resolve-btn:hover{background:rgba(0,255,135,.09);border-color:var(--g)}
.sender-hint{font-size:.88rem;color:var(--w3);text-align:center;line-height:1.55;max-width:280px}

/* GUARDIAN */
.guardian-view{display:flex;flex-direction:column;align-items:center;gap:16px;padding-top:20px;width:100%;max-width:460px;position:relative;z-index:2;animation:slideUp .5s ease both}
.standby-icon{font-size:3.2rem;margin-top:8px}
.standby-title{font-family:var(--fn);font-size:2.2rem;letter-spacing:.14em;color:var(--b)}
.standby-sub{font-family:var(--fm);font-size:.8rem;color:var(--w3);text-align:center}
.status-pill{display:flex;align-items:center;gap:9px;background:rgba(0,255,135,.07);border:1px solid rgba(0,255,135,.28);border-radius:99px;padding:7px 20px;font-family:var(--fm);font-size:.72rem;color:var(--g);letter-spacing:.05em}
.guardian-list-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:14px 18px;width:100%}
.gl-title{font-family:var(--fm);font-size:.58rem;letter-spacing:.2em;color:rgba(255,255,255,.22);margin-bottom:10px}
.gl-item{display:flex;align-items:center;gap:10px;font-size:.9rem;color:var(--w3);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.gl-item:last-child{border-bottom:none}
.gl-dot{width:6px;height:6px;border-radius:50%;background:var(--b);flex-shrink:0}
.emergency-header{width:calc(100% + 32px);margin:0 -16px;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(255,28,28,.22);border-bottom:2px solid var(--r)}
.alert-lbl{font-family:var(--fn);font-size:1.2rem;letter-spacing:.1em;color:var(--r);animation:urgentBlink .5s infinite}
.alert-timer{font-family:var(--fm);font-size:1.1rem;color:var(--w)}
.alert-card{width:100%;background:rgba(255,28,28,.1);border:2px solid var(--r);border-radius:10px;padding:20px;text-align:center;animation:borderFlash .65s infinite}
.alert-name{font-family:var(--fn);font-size:2.8rem;letter-spacing:.14em;color:var(--r)}
.alert-phone{font-family:var(--fm);font-size:.8rem;color:var(--w3);margin:4px 0}
.alert-urgent{font-family:var(--fn);font-size:1.4rem;letter-spacing:.1em;color:var(--w);animation:urgentBlink .42s infinite}
.action-btns{display:flex;flex-direction:column;gap:10px;width:100%}
.act-btn{display:block;text-align:center;text-decoration:none;padding:13px;border-radius:8px;font-family:var(--fn);font-size:1.1rem;letter-spacing:.08em;cursor:pointer;border:2px solid;transition:background .18s;width:100%}
.btn-mute{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.07);color:var(--w)}
.btn-mute:hover{background:rgba(255,255,255,.14)}
.btn-muted{border-color:rgba(255,165,0,.45);background:rgba(255,165,0,.07);color:#FFA500}
.btn-call{border-color:rgba(0,255,135,.42);background:rgba(0,255,135,.05);color:var(--g)}
.btn-call:hover{background:rgba(0,255,135,.12)}
.muted-notice{width:100%;text-align:center;background:rgba(255,165,0,.07);border:1px solid rgba(255,165,0,.28);border-radius:6px;padding:7px;font-family:var(--fm);font-size:.65rem;color:#FFA500;letter-spacing:.07em}
.ts-bar{font-family:var(--fm);font-size:.63rem;letter-spacing:.1em;color:rgba(255,255,255,.18);text-align:center}
#map{width:100%;height:260px;border-radius:8px;border:1px solid rgba(255,51,51,.3);overflow:hidden;z-index:1}
.dist-badge{font-family:var(--fm);font-size:.75rem;color:var(--b);letter-spacing:.07em;text-align:center}
</style>
</head>

<script>

// ── App state ──────────────────────────────────────────────────
var sb = null;
var emergencyState = null;
var sirenPlaying = false;
var muted = false;
var elapsed = 0;
var timerInterval = null;
var gpsWatchId = null;
var myCoords = null;
var map = null, salimMarker = null, guardianMarker = null, routeLine = null;
var audioCtx = null, oscNode = null, gainNode = null;
var app = document.getElementById('app');
var currentUnsubscribe = null;

// ── Helpers ────────────────────────────────────────────────────
function haversine(lat1,lon1,lat2,lon2){
  var R=6371000,p1=lat1*Math.PI/180,p2=lat2*Math.PI/180;
  var dp=(lat2-lat1)*Math.PI/180,dl=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dp/2)*Math.sin(dp/2)+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(m){ return !m||isNaN(m)?'—':m<1000?Math.round(m)+' m':(m/1000).toFixed(2)+' km'; }
function fmtTime(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function el(id){ return document.getElementById(id); }

// ── GPS ────────────────────────────────────────────────────────
function watchGPS(cb){
  if(!navigator.geolocation) return null;
  return navigator.geolocation.watchPosition(
    function(p){ cb({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy}); },
    function(e){ console.warn('GPS:',e.message); },
    {enableHighAccuracy:true,timeout:10000,maximumAge:0}
  );
}

// ── Siren ──────────────────────────────────────────────────────
function startSiren(){
  if(sirenPlaying) return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    oscNode=audioCtx.createOscillator();
    gainNode=audioCtx.createGain();
    gainNode.gain.value=0.75;
    oscNode.type='sawtooth';
    oscNode.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscNode.start();
    function sweep(){
      if(!oscNode) return;
      oscNode.frequency.linearRampToValueAtTime(1100,audioCtx.currentTime+0.4);
      oscNode.frequency.linearRampToValueAtTime(600,audioCtx.currentTime+0.8);
      setTimeout(sweep,800);
    }
    oscNode.frequency.setValueAtTime(600,audioCtx.currentTime);
    sweep();
    sirenPlaying=true;
  }catch(e){ console.error('Siren:',e); }
}
function stopSiren(){
  try{
    if(oscNode){oscNode.stop();oscNode=null;}
    if(gainNode){gainNode.disconnect();gainNode=null;}
    if(audioCtx){audioCtx.close();audioCtx=null;}
  }catch(_){}
  sirenPlaying=false;
}

// ── Map ────────────────────────────────────────────────────────
function initMap(lat,lng){
  if(map||!window.L) return;
  map=L.map('map',{attributionControl:false}).setView([lat,lng],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  L.control.attribution({prefix:'© OpenStreetMap'}).addTo(map);
}
function mkRedIcon(){
  return L.divIcon({html:'<div style="width:20px;height:20px;border-radius:50%;background:#FF1C1C;border:3px solid #fff;box-shadow:0 0 14px rgba(255,28,28,.8)"></div>',iconSize:[20,20],iconAnchor:[10,10],className:''});
}
function mkBlueIcon(){
  return L.divIcon({html:'<div style="width:16px;height:16px;border-radius:50%;background:#4FC3F7;border:3px solid #fff;box-shadow:0 0 10px rgba(79,195,247,.8)"></div>',iconSize:[16,16],iconAnchor:[8,8],className:''});
}
function updateMap(sLat,sLng,mLat,mLng){
  if(!window.L||!map) return;
  try{
    if(!salimMarker) salimMarker=L.marker([sLat,sLng],{icon:mkRedIcon()}).addTo(map).bindPopup('<b style="color:#FF1C1C">🆘 '+PATIENT.name+'</b>');
    else salimMarker.setLatLng([sLat,sLng]);
    if(mLat&&mLng){
      if(!guardianMarker) guardianMarker=L.marker([mLat,mLng],{icon:mkBlueIcon()}).addTo(map).bindPopup('<b style="color:#4FC3F7">📍 You</b>');
      else guardianMarker.setLatLng([mLat,mLng]);
      if(routeLine) map.removeLayer(routeLine);
      routeLine=L.polyline([[sLat,sLng],[mLat,mLng]],{color:'#FF3333',weight:4,dashArray:'10 6'}).addTo(map);
      map.fitBounds([[sLat,sLng],[mLat,mLng]],{padding:[40,40]});
      var db=el('dist-badge');
      if(db) db.textContent='📏 Distance: '+fmtDist(haversine(sLat,sLng,mLat,mLng));
    } else { map.setView([sLat,sLng],15); }
  }catch(e){ console.error('Map:',e); }
}

// ── Supabase DB helpers ────────────────────────────────────────
function activateSOS(lat,lng){
  if(!sb) return Promise.reject(new Error('Supabase not ready'));
  return sb.from('emergency_state').upsert({
    id:1,status:'EMERGENCY',
    latitude:lat,longitude:lng,
    timestamp:Date.now(),
    patient_name:PATIENT.name,patient_phone:PATIENT.phone
  },{onConflict:'id'}).then(function(r){ if(r.error) throw r.error; });
}
function resolveSOS(){
  if(!sb) return Promise.reject(new Error('Supabase not ready'));
  return sb.from('emergency_state').upsert({
    id:1,status:'SAFE',latitude:null,longitude:null,timestamp:Date.now()
  },{onConflict:'id'}).then(function(r){ if(r.error) throw r.error; });
}
function normalise(row){
  if(!row) return null;
  return {
    emergency_status:row.status==='EMERGENCY',
    latitude:row.latitude,longitude:row.longitude,
    timestamp:row.timestamp
  };
}
function listenSOS(cb){
  if(!sb){ cb(null); return function(){}; }
  sb.from('emergency_state').select('*').eq('id',1).single()
    .then(function(r){ if(!r.error&&r.data) cb(normalise(r.data)); });
  var channel=sb.channel('sos-'+Date.now())
    .on('postgres_changes',{event:'*',schema:'public',table:'emergency_state',filter:'id=eq.1'},
      function(p){ cb(normalise(p.new)); })
    .subscribe();
  return function(){ try{ sb.removeChannel(channel); }catch(_){} };
}

// ── Cleanup ────────────────────────────────────────────────────
function cleanup(){
  if(currentUnsubscribe){ currentUnsubscribe(); currentUnsubscribe=null; }
  if(gpsWatchId){ navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId=null; }
  stopSiren(); clearInterval(timerInterval); elapsed=0;
  document.body.classList.remove('emergency-active');
  map=null; salimMarker=null; guardianMarker=null; routeLine=null;
}

// ══════════════════════════════════════════════════════════════
//  ROLE SELECTOR
// ══════════════════════════════════════════════════════════════
function renderHome(){
  cleanup();
  app.innerHTML=
    '<div class="grid-bg"></div>'+
    '<div class="role-selector">'+
      '<div class="sos-logo"><span class="s1">S</span><span class="o">O</span><span class="s2">S</span></div>'+
      '<h1 class="app-title">SALIM SOS</h1>'+
      '<p class="app-subtitle">EMERGENCY RESPONSE SYSTEM</p>'+
      '<div class="divider"></div>'+
      '<p class="role-desc">Select your role to continue.</p>'+
      '<div class="role-cards">'+
        '<button class="role-card sender" onclick="renderSender()">'+
          '<div class="card-icon">🆘</div>'+
          '<div class="card-role">PATIENT</div>'+
          '<div class="card-name">SALIM</div>'+
          '<div class="card-desc">Activate emergency broadcast to all guardians.</div>'+
          '<div class="card-phone">'+PATIENT.phone+'</div>'+
          '<div class="card-enter">→ ENTER</div>'+
        '</button>'+
        '<button class="role-card guardian" onclick="renderGuardian()">'+
          '<div class="card-icon">🛡</div>'+
          '<div class="card-role">GUARDIAN</div>'+
          '<div class="card-name">MONITOR</div>'+
          '<div class="card-desc">Receive alerts &amp; track Salim live.</div>'+
          '<div class="card-phone">Stay alert. Stay ready.</div>'+
          '<div class="card-enter">→ ENTER</div>'+
        '</button>'+
      '</div>'+
      '<div class="sys-status">'+
        '<span class="dot dot-green"></span>'+
        'SYSTEM ONLINE · SUPABASE CONNECTED'+
      '</div>'+
    '</div>';
}

// ══════════════════════════════════════════════════════════════
//  SENDER VIEW
// ══════════════════════════════════════════════════════════════
function renderSender(){
  cleanup();
  function draw(){
    var isE=emergencyState&&emergencyState.emergency_status===true;
    if(isE) document.body.classList.add('emergency-active');
    else document.body.classList.remove('emergency-active');

    var coordsBlock=isE?
      '<div class="coords-card">'+
        '<div class="coord-row"><span class="coord-lbl">LATITUDE</span><span class="coord-val" id="c-lat">'+Number(emergencyState.latitude||0).toFixed(7)+'</span></div>'+
        '<div class="coord-row"><span class="coord-lbl">LONGITUDE</span><span class="coord-val" id="c-lng">'+Number(emergencyState.longitude||0).toFixed(7)+'</span></div>'+
      '</div>'+
      '<button class="resolve-btn" onclick="doResolve()">✓ MARK AS SAFE / RESOLVED</button>'
      :'';

    var mainBlock=isE?
      '<div class="live-panel">'+
        '<div class="live-head">⚠ EMERGENCY ACTIVE</div>'+
        '<div class="live-timer" id="live-timer">00:00</div>'+
        '<div class="live-stat">📡 Broadcasting to '+GUARDIANS.length+' guardians</div>'+
        '<div class="live-stat" id="live-coords">📍 '+(emergencyState.latitude?Number(emergencyState.latitude).toFixed(6)+', '+Number(emergencyState.longitude).toFixed(6):'Locating…')+'</div>'+
      '</div>'
      :
      '<div class="sos-button-wrap">'+
        '<button class="sos-btn" id="sos-btn" onclick="doActivate(this)">'+
          '<span class="ring"></span><span class="ring ring2"></span>'+
          '<div class="btn-inner">'+
            '<span class="btn-icon">🆘</span>'+
            '<span class="btn-label" id="btn-lbl">ACTIVATE</span>'+
            '<span class="btn-sub">EMERGENCY SOS</span>'+
          '</div>'+
        '</button>'+
      '</div>'+
      '<p class="sender-hint">Press only in a real emergency.<br>All '+GUARDIANS.length+' guardians alerted instantly.</p>';

    app.innerHTML=
      (isE?'<div class="scanline"></div>':'')+
      '<div class="grid-bg"></div>'+
      '<div class="sender-view">'+
        '<button class="back-btn" onclick="renderHome()">← BACK</button>'+
        '<div class="patient-badge">'+
          '<span style="font-size:1.5rem">👤</span>'+
          '<div><div class="badge-name">'+PATIENT.name+'</div><div class="badge-phone">'+PATIENT.phone+'</div></div>'+
        '</div>'+
        '<div class="gps-bar">'+
          '<span class="dot dot-yellow" id="gps-dot"></span>'+
          '<span id="gps-text">ACQUIRING GPS…</span>'+
        '</div>'+
        mainBlock+
        coordsBlock+
      '</div>';

    // GPS watcher
    if(gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId=watchGPS(function(c){
      myCoords=c;
      var dot=el('gps-dot'); if(dot) dot.className='dot dot-green';
      var txt=el('gps-text'); if(txt) txt.textContent=c.lat.toFixed(6)+', '+c.lng.toFixed(6)+'  ±'+Math.round(c.acc)+'m';
      if(el('c-lat')){
        el('c-lat').textContent=c.lat.toFixed(7);
        el('c-lng').textContent=c.lng.toFixed(7);
        var lc=el('live-coords'); if(lc) lc.textContent='📍 '+c.lat.toFixed(6)+', '+c.lng.toFixed(6);
      }
    });

    if(isE){
      clearInterval(timerInterval);
      timerInterval=setInterval(function(){ elapsed++; var t=el('live-timer'); if(t) t.textContent=fmtTime(elapsed); },1000);
    }
  }

  window.doActivate=function(btn){
    btn.disabled=true;
    var lbl=el('btn-lbl'); if(lbl) lbl.textContent='ACTIVATING…';
    activateSOS(myCoords?myCoords.lat:0,myCoords?myCoords.lng:0)
    .catch(function(e){ alert('❌ Failed: '+e.message); btn.disabled=false; var l=el('btn-lbl'); if(l) l.textContent='ACTIVATE'; });
  };
  window.doResolve=function(){
    if(!confirm('Mark as RESOLVED?')) return;
    resolveSOS()
    .then(function(){ clearInterval(timerInterval); elapsed=0; document.body.classList.remove('emergency-active'); })
    .catch(function(e){ alert('❌ Failed: '+e.message); });
  };

  currentUnsubscribe=listenSOS(function(data){ emergencyState=data; draw(); });
  draw();
}

// ══════════════════════════════════════════════════════════════
//  GUARDIAN VIEW
// ══════════════════════════════════════════════════════════════
function renderGuardian(){
  cleanup();
  muted=false;
  var alertTime=null;

  function draw(){
    var isE=emergencyState&&emergencyState.emergency_status===true;
    if(isE){
      if(!muted) startSiren();
      document.body.classList.add('emergency-active');
      if(!alertTime){ alertTime=Date.now(); elapsed=0; }
    } else {
      stopSiren(); document.body.classList.remove('emergency-active');
      alertTime=null; elapsed=0; clearInterval(timerInterval);
    }
    map=null; salimMarker=null; guardianMarker=null; routeLine=null;

    var emergencyBlock=isE?
      '<div class="emergency-header">'+
        '<span class="alert-lbl">⚠ EMERGENCY ALERT</span>'+
        '<span class="alert-timer" id="g-timer">00:00</span>'+
      '</div>'+
      '<div class="alert-card">'+
        '<div class="alert-name">'+PATIENT.name.toUpperCase()+'</div>'+
        '<div class="alert-phone">'+PATIENT.phone+'</div>'+
        '<div class="alert-urgent">URGENT ACTION REQUIRED</div>'+
      '</div>'+
      '<div class="coords-card">'+
        '<div class="coord-row"><span class="coord-lbl">LATITUDE</span><span class="coord-val">'+Number(emergencyState.latitude||0).toFixed(7)+'</span></div>'+
        '<div class="coord-row"><span class="coord-lbl">LONGITUDE</span><span class="coord-val">'+Number(emergencyState.longitude||0).toFixed(7)+'</span></div>'+
      '</div>'+
      '<div id="map"></div>'+
      '<p class="dist-badge" id="dist-badge">📏 Calculating distance…</p>'+
      '<div class="action-btns">'+
        '<button class="act-btn '+(muted?'btn-muted':'btn-mute')+'" onclick="gToggleMute()">'+
          (muted?'🔊 UNMUTE SIREN':'🔇 MUTE / ACKNOWLEDGE')+
        '</button>'+
        '<a class="act-btn btn-call" href="tel:'+PATIENT.phone.replace(/\s/g,'')+'">📞 CALL '+PATIENT.name.toUpperCase()+'</a>'+
      '</div>'+
      (muted?'<div class="muted-notice">🔇 SIREN MUTED LOCALLY · EMERGENCY STILL ACTIVE</div>':'')+
      '<p class="ts-bar">ALERT RECEIVED: '+(alertTime?new Date(alertTime).toLocaleTimeString('en-IN',{hour12:true}):'—')+'</p>'
      :
      '<div class="standby-icon">🛡</div>'+
      '<div class="standby-title">GUARDIAN ACTIVE</div>'+
      '<div class="standby-sub">Monitoring '+PATIENT.name+' · '+PATIENT.phone+'</div>'+
      '<div class="status-pill">'+
        '<span class="dot dot-green"></span>'+
        (emergencyState&&emergencyState.emergency_status===false?'ALL CLEAR — SAFE':'MONITORING · NO EMERGENCY')+
      '</div>'+
      '<div class="guardian-list-box">'+
        '<div class="gl-title">GUARDIAN NETWORK ('+GUARDIANS.length+'/10)</div>'+
        GUARDIANS.map(function(g){ return '<div class="gl-item"><span class="gl-dot"></span>'+g.name+' · '+g.phone+'</div>'; }).join('')+
      '</div>'+
      '<p class="sender-hint">Keep this tab open. Alerts fire automatically.</p>';

    app.innerHTML=
      (isE?'<div class="scanline"></div>':'')+
      '<div class="grid-bg"></div>'+
      '<div class="guardian-view">'+
        '<button class="back-btn" onclick="renderHome()">← BACK</button>'+
        emergencyBlock+
      '</div>';

    if(isE&&emergencyState.latitude){
      var sLat=Number(emergencyState.latitude),sLng=Number(emergencyState.longitude);
      if(gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
      gpsWatchId=watchGPS(function(c){ myCoords=c; updateMap(sLat,sLng,c.lat,c.lng); });
      setTimeout(function(){
        try{ initMap(sLat,sLng); updateMap(sLat,sLng,myCoords?myCoords.lat:null,myCoords?myCoords.lng:null); if(map) map.invalidateSize(); }
        catch(e){ console.error('Map:',e); }
      },200);
      clearInterval(timerInterval);
      timerInterval=setInterval(function(){ elapsed++; var t=el('g-timer'); if(t) t.textContent=fmtTime(elapsed); },1000);
    }
  }

  window.gToggleMute=function(){ muted=!muted; muted?stopSiren():startSiren(); draw(); };

  currentUnsubscribe=listenSOS(function(data){ emergencyState=data; draw(); });
  draw();
}

// ══════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════
function showError(msg){
  app.innerHTML=
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:24px;text-align:center;font-family:monospace;background:#050a0e">'+
    '<div style="font-size:3rem">⚠</div>'+
    '<div style="color:#FF3333;font-size:1.1rem;letter-spacing:.1em">FAILED TO LOAD</div>'+
    '<div style="color:rgba(255,255,255,.45);font-size:.82rem;max-width:320px;line-height:1.7">'+msg+'</div>'+
    '<button onclick="location.reload()" style="background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);font-family:monospace;font-size:.8rem;padding:10px 24px;border-radius:6px;cursor:pointer;margin-top:8px">↺ RELOAD</button>'+
    '</div>';
}

function boot(){
  try{
    if(!window.supabase){ setTimeout(boot,300); return; }
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').catch(function(e){ console.warn('SW:',e); });
    }
    var role=new URLSearchParams(window.location.search).get('role');
    if(role==='sender') renderSender();
    else if(role==='guardian') renderGuardian();
    else renderHome();
  }catch(err){
    console.error('Boot failed:',err);
    showError(err.message||'Unknown error. Check browser console (F12).');
  }
}

// Hard timeout — clears spinner if everything fails
setTimeout(function(){
  if(app.innerHTML.includes('LOADING SALIM SOS')){
    showError('App took too long to load.<br>Check your internet connection or Supabase keys.');
  }
},9000);

boot();
</script>
